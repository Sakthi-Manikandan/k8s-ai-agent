apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ai-agent-backend
  namespace: k8s-ai-agent
  labels:
    app: k8s-ai-agent
    component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-ai-agent
      component: backend
  template:
    metadata:
      labels:
        app: k8s-ai-agent
        component: backend
    spec:
      # Use our ServiceAccount!
      serviceAccountName: k8s-ai-agent-sa

      containers:
        - name: backend
          image: your-dockerhub-username/k8s-ai-agent-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          # Load config from ConfigMap
          envFrom:
            - configMapRef:
                name: k8s-ai-agent-config
            - secretRef:
                name: k8s-ai-agent-secret

          # Resource limits
          # Prevents agent from consuming
          # too many cluster resources!
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # Liveness probe
          # Restarts container if unhealthy!
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3

          # Readiness probe
          # Only sends traffic when ready!
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          # Mount data volume for SQLite
          volumeMounts:
            - name: data-volume
              mountPath: /app/data
            - name: logs-volume
              mountPath: /app/logs

      volumes:
        - name: data-volume
          emptyDir: {}
        - name: logs-volume
          emptyDir: {}