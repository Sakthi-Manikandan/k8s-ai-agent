apiVersion: v1
kind: Service
metadata:
  name: k8s-ai-agent-backend-svc
  namespace: k8s-ai-agent
  labels:
    app: k8s-ai-agent
    component: backend
spec:
  selector:
    app: k8s-ai-agent
    component: backend
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
  # ClusterIP = only accessible inside cluster
  # Change to LoadBalancer for external access
  type: ClusterIP