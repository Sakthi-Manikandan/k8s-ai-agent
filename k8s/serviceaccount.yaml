# ServiceAccount - Agent's Identity
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-ai-agent-sa
  namespace: k8s-ai-agent
  labels:
    app: k8s-ai-agent

---
# ClusterRole - What agent CAN do
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-ai-agent-role
  labels:
    app: k8s-ai-agent
rules:
  # Read pods and their logs
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - pods/status
    verbs:
      - get
      - list
      - watch
      - delete   # For restart_pod action

  # Read events
  - apiGroups: [""]
    resources:
      - events
    verbs:
      - get
      - list
      - watch

  # Read services and endpoints
  - apiGroups: [""]
    resources:
      - services
      - endpoints
    verbs:
      - get
      - list
      - watch

  # Read and manage deployments
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
    verbs:
      - get
      - list
      - watch
      - patch    # For restart_deployment
      - update   # For scale_deployment

  # Read namespaces
  - apiGroups: [""]
    resources:
      - namespaces
    verbs:
      - get
      - list

---
# ClusterRoleBinding
# Connects ServiceAccount to ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-ai-agent-binding
  labels:
    app: k8s-ai-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-ai-agent-role
subjects:
  - kind: ServiceAccount
    name: k8s-ai-agent-sa
    namespace: k8s-ai-agent