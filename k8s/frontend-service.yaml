apiVersion: v1
kind: Service
metadata:
  name: k8s-ai-agent-frontend-svc
  namespace: k8s-ai-agent
  labels:
    app: k8s-ai-agent
    component: frontend
spec:
  selector:
    app: k8s-ai-agent
    component: frontend
  ports:
    - name: http
      protocol: TCP
      port: 8501
      targetPort: 8501
  # NodePort for local minikube access
  # Change to LoadBalancer for production
  type: NodePort