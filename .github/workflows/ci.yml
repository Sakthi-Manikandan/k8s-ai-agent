name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────
  # Job 1: Code Quality
  # ─────────────────────────────────
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Run flake8 linting
        run: |
          flake8 backend/ \
            --max-line-length=100 \
            --exclude=__pycache__ \
            --ignore=E501,W503
        continue-on-error: true

      - name: Check imports
        run: |
          python -c "from backend.core.settings import settings; print('Settings OK')"
          python -c "from backend.core.logger import log; print('Logger OK')"

  # ─────────────────────────────────
  # Job 2: Unit Tests
  # ─────────────────────────────────
  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Create env file
        run: |
          cat > .env << EOF
          OLLAMA_BASE_URL=http://localhost:11434
          OLLAMA_MODEL=llama3
          APP_ENV=test
          APP_HOST=0.0.0.0
          APP_PORT=8000
          STREAMLIT_PORT=8501
          KUBECONFIG_PATH=~/.kube/config
          EOF

      - name: Run tests
        run: |
          pytest tests/ -v \
            --cov=backend \
            --cov-report=term-missing

  # ─────────────────────────────────
  # Job 3: Security Scan
  # ─────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install bandit
        run: pip install bandit

      - name: Run security scan
        run: |
          bandit -r backend/ \
            -ll \
            --exclude backend/__pycache__ \
            || true

      - name: Print security summary
        run: echo "Security scan complete!"