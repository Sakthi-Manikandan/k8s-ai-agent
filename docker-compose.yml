version: '3.8'

services:
  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: k8s-ai-agent-backend
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    volumes:
      - ~/.kube:/root/.kube:ro
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - k8s-ai-network

  # Streamlit Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: k8s-ai-agent-frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - k8s-ai-network

networks:
  k8s-ai-network:
    driver: bridge